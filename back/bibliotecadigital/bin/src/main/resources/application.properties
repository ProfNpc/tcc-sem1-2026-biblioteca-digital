spring.application.name=bibliotecadigital
server.port=8080

# Configurações do Banco de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/bibliotecadigital?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
# IMPORTANTE: Coloque a sua senha do MySQL na linha abaixo (substitua a palavra "root" se sua senha for outra)
spring.datasource.password=guii0308
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações do JPA / Hibernate
